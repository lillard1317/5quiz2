  <script>

const ALL_QUESTIONS = [
  // ===== 共通する性状 (7問) =====
  { category:"共通する性状", id:"s01", question:"第5類の危険物の性状について、次のうち正しいものはどれか。\n1. 引火性を有するものはない。\n2. 分子構造内に酸素を有しているものもある\n3. 燃焼速度は極めて小さい。\n4. すべて自己反応性の固体である。\n5. すべて不燃性である。", choices:["引火性を有するものはない。","分子構造内に酸素を有しているものもある","燃焼速度は極めて小さい。","すべて自己反応性の固体である。","すべて不燃性である。"], answer:2, explanation:"硝酸メチルや硝酸エチルは液体で引火性あり。アジ化ナトリウムなどは分子内に酸素を有しないが窒素ガスを発生する。燃焼速度は極めて大きい。固体と液体のものがある。ほとんどが可燃性。" },
  { category:"共通する性状", id:"s02", question:"第5類の危険物に共通する性状について、次のうち正しいものはどれか。\n1. 引火性がある。\n2. 金属と反応して分解し、自然発火する。\n3. 燃焼または加熱分解が速い。\n4. 分子内に酸素と窒素を含有している。\n5. 水に溶けない。", choices:["引火性がある。","金属と反応して分解し、自然発火する。","燃焼または加熱分解が速い。","分子内に酸素と窒素を含有している。","水に溶けない。"], answer:3, explanation:"引火性はあるものもないものもある。金属と反応するものもあるが全てではない。有機過酸化物のように窒素を含まないもの、アジ化ナトリウムのように酸素を含まないものもある。過酢酸やピクリン酸、アジ化ナトリウムは水に溶ける。" },
  { category:"共通する性状", id:"s03", question:"第5類の危険物で常温（20℃）で液状のものは、次のうちどれか。\n1. ピクリン酸\n2. エチルメチルケトンパーオキサイド\n3. ニトロセルロース\n4. 硫酸ヒドラジン\n5. アジ化ナトリウム", choices:["ピクリン酸","エチルメチルケトンパーオキサイド","ニトロセルロース","硫酸ヒドラジン","アジ化ナトリウム"], answer:2, explanation:"エチルメチルケトンパーオキサイドは常温で液体。その他は固体。" },
  { category:"共通する性状", id:"s04", question:"次の第5類の危険物のうち、常温（20℃）で引火の危険性を有するものはどれか。\n1. 硫酸ヒドラジン\n2. 過酢酸（酢酸で希釈し、40％にしたもの）\n3. 硫酸ヒドロキシルアミン\n4. ピクリン酸\n5. 硝酸エチル", choices:["硫酸ヒドラジン","過酢酸（酢酸で希釈し、40％にしたもの）","硫酸ヒドロキシルアミン","ピクリン酸","硝酸エチル"], answer:5, explanation:"硝酸エチルの引火点は10℃であり、常温（20℃）で引火の危険性を有する。" },
  { category:"共通する性状", id:"s05", question:"第5類の危険物の性状について、次のうち誤っているものはどれか。\n1. 固体のものは、常温（20℃）で乾燥させると、衝撃・摩擦に対して危険性が小さくなるものが多い。\n2. 燃焼速度が大きい。\n3. 引火性のものがある。\n4. 酸素を含有せず、分解し、爆発するものがある。", choices:["固体のものは、常温（20℃）で乾燥させると、衝撃・摩擦に対して危険性が小さくなるものが多い。","燃焼速度が大きい。","引火性のものがある。","酸素を含有せず、分解し、爆発するものがある。"], answer:1, explanation:"固体のものは乾燥させると衝撃・摩擦に対して危険性が大きくなるものが多い。このため水で湿らせたり含水状態にして貯蔵する。" },
  { category:"共通する性状", id:"s06", question:"第5類の危険物の性状について、次のうち誤っているものはどれか。\n1. 固体のものは、水に溶けるものがある。\n2. 直射日光により、自然発火するおそれがあるものがある。\n3. 燃焼すると人体に有害なガスを発生するものが多い。\n4. 水との接触により、発火するおそれのあるものがある。\n5. 鉄製容器（内部を樹脂等で被覆していないもの）を使用できないものがある。", choices:["固体のものは、水に溶けるものがある。","直射日光により、自然発火するおそれがあるものがある。","燃焼すると人体に有害なガスを発生するものが多い。","水との接触により、発火するおそれのあるものがある。","鉄製容器（内部を樹脂等で被覆していないもの）を使用できないものがある。"], answer:4, explanation:"第5類の危険物に、禁水性のものはない。" },
  { category:"共通する性状", id:"s07", question:"第5類の危険物に共通する性状について、次のA～Dのうち、正しいものを組み合わせたものはどれか。\nA. 燃焼速度が大きい。\nB. 水によく溶ける。\nC. 多くは加熱、衝撃、摩擦により発火・爆発のおそれがある。\nD. 比重は1より小さい。\n\n1. AとB　2. AとC　3. AとD　4. BとC　5. CとD", choices:["AとB","AとC","AとD","BとC","CとD"], answer:2, explanation:"B：水によく溶けるものばかりではない。D：比重は1より大きい。A（燃焼速度が大きい）とC（加熱・衝撃・摩擦により発火・爆発のおそれ）が正しい。" },

  // ===== 共通する貯蔵・取扱い方法 (13問) =====
  { category:"共通する貯蔵・取扱い方法", id:"t01", question:"第5類の危険物を貯蔵し、または取り扱う場合、危険物の性状に照らして、一般に火災発生の危険性が最も小さいものは、次のうちどれか。\n1. 火花や炎の接近\n2. 加熱および衝撃\n3. 他の薬品との接触\n4. 水との接触\n5. 温度管理や湿度管理の不適切", choices:["火花や炎の接近","加熱および衝撃","他の薬品との接触","水との接触","温度管理や湿度管理の不適切"], answer:4, explanation:"第5類の危険物に禁水性のものはないため、水との接触が最も火災発生の危険性が小さい。" },
  { category:"共通する貯蔵・取扱い方法", id:"t02", question:"第5類の危険物に共通する貯蔵・取扱いの注意事項として、次のA～Eのうち誤っているものはいくつあるか。\nA. 換気のよい冷暗所に貯蔵する。\nB. 容器は、密栓しないでガス抜き口を設けたものを使用する。\nC. 加熱、衝撃または摩擦を避けて取り扱う。\nD. 分解しやすい物質は、特に室温、湿気、通風に注意する。\nE. 断熱性の良い容器に貯蔵する。\n\n1. 1つ　2. 2つ　3. 3つ　4. 4つ　5. 5つ", choices:["1つ","2つ","3つ","4つ","5つ"], answer:2, explanation:"B：密栓するものもあり全てにガス抜き口が必要なわけではない。E：断熱性の良い容器に入れると分解熱が蓄積し危険。BとEの2つが誤り。" },
  { category:"共通する貯蔵・取扱い方法", id:"t03", question:"第5類の危険物の貯蔵、取扱いについて、次のうち適切でないものはどれか。\n1. 関係者以外の者が出入りしないように管理する。\n2. 類を異にする危険物や危険物以外の物品を接近して貯蔵しない。\n3. 火災に備えて、不活性ガス消火設備を設置する。\n4. 通風、換気がよく直射日光を受けない冷暗所に貯蔵する。\n5. 物品の性状に応じて湿度を管理する。", choices:["関係者以外の者が出入りしないように管理する。","類を異にする危険物や危険物以外の物品を接近して貯蔵しない。","火災に備えて、不活性ガス消火設備を設置する。","通風、換気がよく直射日光を受けない冷暗所に貯蔵する。","物品の性状に応じて湿度を管理する。"], answer:3, explanation:"不活性ガス消火設備は第5類には適応しない。第5類は自己燃焼性があるため酸素を遮断しても燃焼が継続する。大量の水や泡消火剤を使用する。" },
  { category:"共通する貯蔵・取扱い方法", id:"t04", question:"第5類の危険物の貯蔵、取扱い上の注意事項として、次のうち適切でないものはどれか。\n1. 分解が促進されるので、日光、紫外線を避ける。\n2. 危険性を弱めるために、可塑剤を加えるものがある。\n3. 容器のふたにはガス抜き口を設けるものがある。\n4. 固体のものは、危険性を弱めるため乾燥した状態に保つ。\n5. 希釈剤を加えたものは、希釈剤が蒸発すると危険性が増すので、目減りに注意する。", choices:["分解が促進されるので、日光、紫外線を避ける。","危険性を弱めるために、可塑剤を加えるものがある。","容器のふたにはガス抜き口を設けるものがある。","固体のものは、危険性を弱めるため乾燥した状態に保つ。","希釈剤を加えたものは、希釈剤が蒸発すると危険性が増すので、目減りに注意する。"], answer:4, explanation:"過酸化ベンゾイルやピクリン酸などは乾燥すると爆発の危険性が増すため含水状態で貯蔵するものもある。「乾燥した状態に保つ」は誤り。" },
  { category:"共通する貯蔵・取扱い方法", id:"t05", question:"危険物の貯蔵方法として、次のうち正しいものはどれか。\n1. ジアゾジニトロフェノールを水とアルコールの混合液中に貯蔵した。\n2. ピクリン酸を銅製容器に貯蔵した。\n3. ニトロセルロースを完全に乾燥させて貯蔵した。\n4. アジ化ナトリウムをポリ塩化ビニル製の容器に貯蔵した。\n5. エチルメチルケトンパーオキサイドを容器に密栓して貯蔵した。", choices:["ジアゾジニトロフェノールを水とアルコールの混合液中に貯蔵した。","ピクリン酸を銅製容器に貯蔵した。","ニトロセルロースを完全に乾燥させて貯蔵した。","アジ化ナトリウムをポリ塩化ビニル製の容器に貯蔵した。","エチルメチルケトンパーオキサイドを容器に密栓して貯蔵した。"], answer:1, explanation:"ジアゾジニトロフェノールは水またはアルコールとの混合液中に貯蔵する。ピクリン酸は金属容器NG、ニトロセルロースは湿綿状態で貯蔵、アジ化ナトリウムはポリエチレン等容器に、MEKPOは通気性フタ付きで貯蔵。" },
  { category:"共通する貯蔵・取扱い方法", id:"t06", question:"第5類の危険物の貯蔵および消火方法について、次のうち正しいものはどれか。\n1. ニトロセルロースは、アルコールで湿潤にして貯蔵する。\n2. 貯蔵する容器は、すべて密封する。\n3. 有機過酸化物は、水分を避け、よく乾燥した状態で保存する。\n4. 金属のアジ化物は、酸素を含まないので、二酸化炭素消火剤による窒息消火が最も有効である。\n5. 燃焼が極めて速いため、燃焼の抑制作用のあるハロゲン化物消火剤が有効である。", choices:["ニトロセルロースは、アルコールで湿潤にして貯蔵する。","貯蔵する容器は、すべて密封する。","有機過酸化物は、水分を避け、よく乾燥した状態で保存する。","金属のアジ化物は、酸素を含まないので、二酸化炭素消火剤による窒息消火が最も有効である。","燃焼が極めて速いため、燃焼の抑制作用のあるハロゲン化物消火剤が有効である。"], answer:1, explanation:"ニトロセルロースはアルコールまたは水で湿潤にして貯蔵する。MEKPOは通気性フタ付き容器使用。過酸化ベンゾイルは水で湿らせて保存。アジ化ナトリウム火災にCO2消火剤は不可。ハロゲン化物消火剤も第5類には不適。" },
  { category:"共通する貯蔵・取扱い方法", id:"t07", question:"火災予防上、危険物を貯蔵する際の注意事項として、次のA～Eのうち適切でないものの組合せはどれか。\nA. ニトログリセリンは、凍結させておく。\nB. 過酸化ベンゾイルは、完全に乾燥させておく。\nC. エチルメチルケトンパーオキサイドの容器には、内部の過圧力を自動的に排出できる装置を設ける。\nD. ニトロセルロースは、日光を避ける。\nE. ピクリン酸は、金属との接触を避ける。\n\n1. AとB　2. AとC　3. BとE　4. CとD　5. DとE", choices:["AとB","AとC","BとE","CとD","DとE"], answer:1, explanation:"A：ニトログリセリンは8℃で凍結するが凍結させると感度が高くなり危険性が増す。B：過酸化ベンゾイルは水で湿らせて純度を下げて貯蔵する（乾燥はNG）。AとBが不適切。" },
  { category:"共通する貯蔵・取扱い方法", id:"t08", question:"危険物を貯蔵し、取り扱う際の注意事項として、次のA～Eのうち適切なものの組合せはどれか。\nA. ジアゾジニトロフェノールは、完全に乾燥させて貯蔵する。\nB. ジニトロペンタメチレンテトラミンは、酸を加えて貯蔵する。\nC. ピクリン酸の容器は、金属製のものを使用する。\nD. 硝酸エチルは、常温（20℃）で引火するおそれがあるので、火気を近づけない\nE. エチルメチルケトンパーオキサイドの容器は、内圧が上昇したときに圧力が放出できるものとし、密栓は避ける。\n\n1. AとB　2. AとC　3. BとD　4. CとE　5. DとE", choices:["AとB","AとC","BとD","CとE","DとE"], answer:5, explanation:"D：硝酸エチルの引火点は10℃であり常温で引火のおそれあり。E：MEKPOは通気性フタ付き容器（密栓NG）。DとEが適切。" },
  { category:"共通する貯蔵・取扱い方法", id:"t09", question:"火災予防上、危険物を貯蔵する際の注意事項として、次のうち適切なものはどれか。\n1. ピクリン酸は、金属との接触を避ける。\n2. エチルメチルケトンパーオキサイドは、容器を密栓する。\n3. ジアゾジニトロフェノールは、完全に乾燥させておく。\n4. ニトロセルロースは、水との接触を避ける。\n5. ニトログリセリンは、凍結させておく。", choices:["ピクリン酸は、金属との接触を避ける。","エチルメチルケトンパーオキサイドは、容器を密栓する。","ジアゾジニトロフェノールは、完全に乾燥させておく。","ニトロセルロースは、水との接触を避ける。","ニトログリセリンは、凍結させておく。"], answer:1, explanation:"ピクリン酸は金属と反応して衝撃に敏感な爆発性の金属塩を生成するため、金属との接触を避ける。" },
  { category:"共通する貯蔵・取扱い方法", id:"t10", question:"第5類の危険物の貯蔵、取扱いにおいて、金属との接触を特に避けなければならないものは、次のうちどれか。\n1. 硝酸メチル\n2. 硝酸エチル\n3. セルロイド\n4. ピクリン酸\n5. トリニトロトルエン", choices:["硝酸メチル","硝酸エチル","セルロイド","ピクリン酸","トリニトロトルエン"], answer:4, explanation:"ピクリン酸は金属と反応し衝撃に敏感な爆発性の金属塩が生じるため、金属との接触を避けて貯蔵する。" },
  { category:"共通する貯蔵・取扱い方法", id:"t11", question:"第5類の危険物の貯蔵、取扱いについて、次のA～Eのうち正しいものはいくつあるか。\nA. 通風のよい冷暗所に保管する。\nB. 廃棄するときは、ひとまとめにして土中に埋める。\nC. 長期間貯蔵されたニトロセルロースは、空気中の酸素によって酸化されているので、爆発する危険性は小さくなっている。\nD. セルロイドは、特に夏期に自然発火することが多いので、貯蔵湿度に注意する。\nE. 日光によって茶褐色に変わったトリニトロトルエンは、衝撃を与えても爆発することはない。\n\n1. 1つ　2. 2つ　3. 3つ　4. 4つ　5. 5つ", choices:["1つ","2つ","3つ","4つ","5つ"], answer:2, explanation:"A・Dが正しい。B：廃棄は物品ごとの方法で行う。C：長期貯蔵されたニトロセルロースは分解が進み爆発危険性が増す。E：TNTは日光で変色するが爆発性はなくならない。" },
  { category:"共通する貯蔵・取扱い方法", id:"t12", question:"第5類の危険物の貯蔵、取扱いの注意事項として、次のA～Eのうち正しいものはいくつあるか。\nA. 物品によっては、乾燥すると危険なものがあるので注意する。\nB. 貯蔵する容器はすべて密栓しておく。\nC. 炎、火花もしくは高温体との接近を避け、また、衝撃を与えないようにする。\nD. 容器に収納された危険物の温度が分解温度を超えないように注意して貯蔵する。\nE. 取扱い場所に置く量は、常に最小限とする。\n\n1. 1つ　2. 2つ　3. 3つ　4. 4つ　5. 5つ", choices:["1つ","2つ","3つ","4つ","5つ"], answer:4, explanation:"A・C・D・Eが正しい。B：MEKPOは密栓NGで通気性フタ付きを使用する。全てを密栓はNG。" },
  { category:"共通する貯蔵・取扱い方法", id:"t13", question:"第5類の危険物に共通する貯蔵および取扱方法について、次のうち誤っているものはどれか。\n1. 加熱、衝撃、摩擦を避ける。\n2. 分解や爆発をさせないために、水を加えて貯蔵するものがある。\n3. 他の薬品と接触させない。\n4. 冷暗所に貯蔵する。\n5. 作業靴、作業衣、絶縁性があるものを着用する。", choices:["加熱、衝撃、摩擦を避ける。","分解や爆発をさせないために、水を加えて貯蔵するものがある。","他の薬品と接触させない。","冷暗所に貯蔵する。","作業靴、作業衣、絶縁性があるものを着用する。"], answer:5, explanation:"絶縁性があるものを着用すると静電気が蓄積され、放電火花による火災が発生するおそれがある。" },

  // ===== 共通する消火方法 (4問) =====
  { category:"共通する消火方法", id:"k01", question:"第5類の危険物の火災の消火について、水を用いることが適切でない物質は、次のうちどれか。\n1. 硝酸グアニジン\n2. ニトロセルロース\n3. アジ化ナトリウム\n4. ジニトロソペンタメチレンテトラミン\n5. ピクリン酸", choices:["硝酸グアニジン","ニトロセルロース","アジ化ナトリウム","ジニトロソペンタメチレンテトラミン","ピクリン酸"], answer:3, explanation:"アジ化ナトリウムは熱分解でナトリウムと窒素に分解する。ナトリウムは水と反応して水素を発生するため消火に水は不可。乾燥砂による窒息消火が適当。" },
  { category:"共通する消火方法", id:"k02", question:"第5類の危険物の火災の消火について、水を用いることが適切でない物質は、次のうちどれか。\n1. 硝酸ヒドラジン\n2. アゾビスイソブチロニトリル\n3. トリニトロトルエン\n4. アジ化ナトリウム\n5. 過酸化ベンゾイル", choices:["硝酸ヒドラジン","アゾビスイソブチロニトリル","トリニトロトルエン","アジ化ナトリウム","過酸化ベンゾイル"], answer:4, explanation:"アジ化ナトリウムは熱分解でナトリウムと窒素に分解する。ナトリウムは水と反応して水素を発生するため消火に水は不可。乾燥砂による窒息消火が適当。" },
  { category:"共通する消火方法", id:"k03", question:"下表の危険物（有機過酸化物・硝酸エステル類・ニトロソ化合物・アゾ化合物・ヒドロキシルアミン塩類・硝酸グアニジン）の火災に共通して使用できる消火剤として適切なものの組合せはどれか。\nA. ハロゲン化物消火剤\nB. 粉末消火剤\nC. 泡消火剤\nD. 二酸化炭素消火剤\nE. 乾燥砂\n\n1. AとB　2. AとE　3. BとC　4. BとD　5. CとE", choices:["AとB","AとE","BとC","BとD","CとE"], answer:5, explanation:"アジ化ナトリウム以外の第5類は大量の水または泡消火剤、乾燥砂、膨張ひる石、膨張真珠岩が適応する。CとEが正解。" },
  { category:"共通する消火方法", id:"k04", question:"次の危険物（過酢酸・ヒドロキシルアミン・ジニトロソペンタメチレンテトラミン）の火災に共通する消火方法として適切なもののみをすべて掲げているものはどれか。\nA. 霧状または棒状の水を放射する。\nB. 粉末消火剤（炭酸水素塩類）を放射する。\nC. 二酸化炭素消火剤を放射する。\nD. 水溶性液体用泡消火剤を放射する。\nE. ハロゲン化物消火剤を放射する。\n\n1. A　2. A・B　3. A・D　4. A・B・E　5. A・C・E", choices:["A","A・B","A・D","A・B・E","A・C・E"], answer:3, explanation:"アジ化ナトリウム以外の第5類には大量の水または泡消火剤が適応する。A（水）とD（泡消火剤）が適切。" },

  // ===== 有機過酸化物(1) (5問) =====
  { category:"有機過酸化物", id:"y01", question:"有機過酸化物の一般的な貯蔵および取扱方法について、次のA～Eのうち誤っているものの組合せはどれか。\nA. できるだけ不活性な溶剤、可塑剤等で希釈して貯蔵または取り扱う。\nB. 有機物が混入しないようにする。\nC. 水と反応するものがあるので、水との接触を避ける。\nD. 金属片が混入しないようにする。\nE. すべて密栓された貯蔵容器で保存する。\n\n1. AとB　2. AとC　3. BとD　4. CとE　5. DとE", choices:["AとB","AとC","BとD","CとE","DとE"], answer:4, explanation:"C：有機過酸化物（過酸化ベンゾイル・MEKPO・過酢酸）は水と反応しない。E：MEKPOは密閉すると内圧上昇で分解が促進されるため通気孔付きフタを使用する。CとEが誤り。" },
  { category:"有機過酸化物", id:"y02", question:"過酸化ベンゾイルの性状等について、次のうち誤っているものはどれか。\n1. 特有の臭気を有する無色油状の液体である。\n2. 強力な酸化作用を有する。\n3. 油脂、ワックス、小麦粉等の漂白に用いられる。\n4. 熱、衝撃または摩擦によって爆発的に分解する。\n5. 光によって分解が促進される。", choices:["特有の臭気を有する無色油状の液体である。","強力な酸化作用を有する。","油脂、ワックス、小麦粉等の漂白に用いられる。","熱、衝撃または摩擦によって爆発的に分解する。","光によって分解が促進される。"], answer:1, explanation:"「特有の臭気を有する無色油状の液体」はメチルエチルケトンパーオキサイドの特徴。過酸化ベンゾイルは無臭で白色の粒状結晶または粉末。" },
  { category:"有機過酸化物", id:"y03", question:"過酸化ベンゾイルの性状について、次のうち誤っているものはどれか。\n1. 無色無臭の液体である。\n2. 皮膚に触れると皮膚炎を起こす。\n3. エーテル、ベンゼンなどの有機溶媒に溶ける。\n4. 衝撃、摩擦によって爆発的に分解しやすい。\n5. 強力な酸化作用がある。", choices:["無色無臭の液体である。","皮膚に触れると皮膚炎を起こす。","エーテル、ベンゼンなどの有機溶媒に溶ける。","衝撃、摩擦によって爆発的に分解しやすい。","強力な酸化作用がある。"], answer:1, explanation:"過酸化ベンゾイルは無臭で白色の粒状結晶または粉末。液体ではない。" },
  { category:"有機過酸化物", id:"y04", question:"過酸化ベンゾイルの性状について、次のうち誤っているものはどれか。\n1. 無色無臭の化合物である。\n2. 強い酸化性を有している。\n3. 水、アルコールに溶ける。\n4. 粉じんは眼や肺を刺激する。\n5. 光によって分解する。", choices:["無色無臭の化合物である。","強い酸化性を有している。","水、アルコールに溶ける。","粉じんは眼や肺を刺激する。","光によって分解する。"], answer:3, explanation:"過酸化ベンゾイルは水に溶けない。またアルコールとは激しく反応する。" },
  { category:"有機過酸化物", id:"y05", question:"可塑剤で50wt%に希釈された過酸化ベンゾイルの火災の初期消火について、次のA～Eのうち適切でないものの組合せはどれか。\nA. 粉末消火剤（リン酸塩類）で消火する。\nB. 泡消火剤で消火する。\nC. 水（噴霧状）で消火する。\nD. 強化液消火剤（棒状）で消火する。\nE. 二酸化炭素消火剤で消火する。\n\n1. AとB　2. AとE　3. BとC　4. CとD　5. DとE", choices:["AとB","AとE","BとC","CとD","DとE"], answer:2, explanation:"第5類の危険物の火災には、粉末消火剤（A）および二酸化炭素消火剤（E）が適応しない。AとEが不適切。" },

  // ===== 有機過酸化物(2) (5問) =====
  { category:"有機過酸化物", id:"y06", question:"メチルエチルケトンパーオキサイド（市販品）の貯蔵および取扱いについて、次のA～Eのうち適切でないものはいくつあるか。\nA. 高純度のものはフタル酸ジメチルなどで希釈されたものが用いられる。\nB. 酸化鉄、ぼろ布と接触すると分解するので、これらと接触させない。\nC. 直射日光を避け、冷暗所に貯蔵する。\nD. 水と接触すると分解するので、水と接触させない。\nE. 容器に密栓して貯蔵する。\n\n1. 1つ　2. 2つ　3. 3つ　4. 4つ　5. 5つ", choices:["1つ","2つ","3つ","4つ","5つ"], answer:2, explanation:"D：MEKPOは水と接触しても分解しない。E：密栓すると内圧上昇で分解が進むため通気孔付きフタを使用。DとEの2つが不適切。" },
  { category:"有機過酸化物", id:"y07", question:"エチルメチルケトンパーオキサイドの希釈剤として一般に使用されているものは、次のうちどれか。\n1. ナフテン酸コバルト\n2. ジメチルアニリン\n3. 水\n4. 2ープロパノール\n5. フタル酸ジメチル", choices:["ナフテン酸コバルト","ジメチルアニリン","水","2ープロパノール","フタル酸ジメチル"], answer:5, explanation:"MEKPOは純度が高いと危険性が高くなるため、可塑剤のジメチルフタレート（フタル酸ジメチル）で希釈したものが市販品として流通している。" },
  { category:"有機過酸化物", id:"y08", question:"屋内貯蔵所内で発生しているエチルメチルケトンパーオキサイド（市販品）の漏れ事故の処置について、次のうち適切でないものはどれか。\n1. けいそう土で吸収した後、早急に注意深く少量ずつ焼却する。\n2. 注水して、貯留設備に流し込んだ後、容器に回収する。\n3. 砂で覆い、吸い取った後、床を石けん水で洗う。\n4. 水酸化ナトリウムを散布し、中和して回収する。\n5. 少量の場合は、布で吸い取って、速やかに注意深く少しずつ焼却する。", choices:["けいそう土で吸収した後、早急に注意深く少量ずつ焼却する。","注水して、貯留設備に流し込んだ後、容器に回収する。","砂で覆い、吸い取った後、床を石けん水で洗う。","水酸化ナトリウムを散布し、中和して回収する。","少量の場合は、布で吸い取って、速やかに注意深く少しずつ焼却する。"], answer:5, explanation:"エチルメチルケトンパーオキサイドは布と接触すると分解が進むため、布で吸い取ってはいけない。けいそう土や砂等で吸収して回収する。" },
  { category:"有機過酸化物", id:"y09", question:"防水工事に使用して余った硬化剤（エチルメチルケトンパーオキサイド含有）の事故発生原因として、最も考えにくいものは次のうちどれか。\n1. 鉄製の錆びたひしゃくを一緒に入れたため、分解が促進された。\n2. ぼろ布を一緒に入れたため、分解が促進された。\n3. 直射日光が当たって温度が上昇したため、分解が促進された。\n4. 余った硬化促進剤（ナフテン酸コバルト）を一緒に入れたため、分解が促進された。\n5. ガラス製の計量カップを一緒に入れたため、分解が促進された。", choices:["鉄製の錆びたひしゃくを一緒に入れたため、分解が促進された。","ぼろ布を一緒に入れたため、分解が促進された。","直射日光が当たって温度が上昇したため、分解が促進された。","余った硬化促進剤（ナフテン酸コバルト）を一緒に入れたため、分解が促進された。","ガラス製の計量カップを一緒に入れたため、分解が促進された。"], answer:5, explanation:"エチルメチルケトンパーオキサイドはプラスチックやガラスと接触しても分解が進むことはない。" },
  { category:"有機過酸化物", id:"y10", question:"次の文の下線部分【A】～【C】のうち、事故の要因となったと考えられるもののみをすべて掲げているものはどれか。\n「硬化剤が余ったため、【A】鉄製の錆びた計量カップと一緒に、【B】ポリエチレン製の容器に入れ、【C】直射日光の当たる屋外に置いていたところ、エチルメチルケトンパーオキサイドが分解して発火した。」\n\n1. A　2. C　3. A・B　4. A・C　5. B・C", choices:["A","C","A・B","A・C","B・C"], answer:4, explanation:"A：鉄さびと接触すると分解が促進される。C：直射日光（紫外線）により分解する。B：ポリエチレン製の容器は問題なし。AとCが事故の要因。" },

  // ===== 有機過酸化物(3) 過酢酸 (6問) =====
  { category:"有機過酸化物（過酢酸）", id:"p01", question:"過酢酸（酢酸で希釈し、40％にしたもの）の性状について、次のうち誤っているものはどれか。\n1. 強い刺激臭がする。\n2. 水との接触により、激しく分解する。\n3. 引火性を有する。\n4. 酸化性物質との接触により、爆発することがある。\n5. 110℃以上に加熱すると、爆発する。", choices:["強い刺激臭がする。","水との接触により、激しく分解する。","引火性を有する。","酸化性物質との接触により、爆発することがある。","110℃以上に加熱すると、爆発する。"], answer:2, explanation:"過酢酸は水によく溶ける。水で希釈すると危険性が低下する。水との接触で激しく分解するのは誤り。" },
  { category:"有機過酸化物（過酢酸）", id:"p02", question:"過酢酸の性状について、次のうち誤っているものはどれか。\n1. 水、エタノールによく溶ける。\n2. 110℃以上に加熱すると爆発することがある。\n3. 硫酸によく溶ける。\n4. 引火性を有しない。\n5. 有害な物質である。", choices:["水、エタノールによく溶ける。","110℃以上に加熱すると爆発することがある。","硫酸によく溶ける。","引火性を有しない。","有害な物質である。"], answer:4, explanation:"過酢酸は引火性を有する。加熱するとその蒸気と空気が混合して引火する。" },
  { category:"有機過酸化物（過酢酸）", id:"p03", question:"過酢酸の発火、爆発を起こすおそれのないものは次のうちどれか。\n1. 二酸化炭素\n2. 衝撃や摩擦\n3. 200℃の熱源\n4. 酸化剤の接触\n5. 金属粉との接触", choices:["二酸化炭素","衝撃や摩擦","200℃の熱源","酸化剤の接触","金属粉との接触"], answer:1, explanation:"110℃以上に加熱すると爆発するため熱源・酸化剤・有機物との接触・衝撃や摩擦は爆発のおそれがある。二酸化炭素は発火・爆発を起こすおそれはない。" },
  { category:"有機過酸化物（過酢酸）", id:"p04", question:"過酢酸の性状に関する次のA～Dについて、正誤の組合せとして、正しいものはどれか。\nA. 加熱すると爆発する。\nB. 有毒で粘膜に対する刺激性が強い。\nC. アルコール、エーテルには溶けない。\nD. 空気と混合して、引火性、爆発性の気体を生成する。\n\n1. A→✖、B→○、C→○、D→✖\n2. A→○、B→✖、C→○、D→✖\n3. A→○、B→✖、C→✖、D→✖\n4. A→✖、B→○、C→✖、D→○\n5. A→○、B→○、C→✖、D→○", choices:["A→✖、B→○、C→○、D→✖","A→○、B→✖、C→○、D→✖","A→○、B→✖、C→✖、D→✖","A→✖、B→○、C→✖、D→○","A→○、B→○、C→✖、D→○"], answer:5, explanation:"A：110℃以上に加熱すると爆発（○）。B：有毒で粘膜刺激性が強い（○）。C：過酢酸はアルコール・エーテルによく溶ける（✖）。D：引火性を有し蒸気は引火・爆発性（○）。" },
  { category:"有機過酸化物（過酢酸）", id:"p05", question:"過酢酸の性状について、次のA～Eのうち、正しいものはいくつあるか。\nA. 強い刺激臭がある。\nB. 有機物との接触により、爆発することがある。\nC. 水に溶けない。\nD. 引火性を有する。\nE. 110℃以上に加熱すると爆発することがある。\n\n1. 1つ　2. 2つ　3. 3つ　4. 4つ　5. 5つ", choices:["1つ","2つ","3つ","4つ","5つ"], answer:4, explanation:"A・B・D・Eが正しい。C：水にはよく溶ける（✖）。4つが正しい。" },
  { category:"有機過酸化物（過酢酸）", id:"p06", question:"過酢酸（酢酸で希釈し、40％にしたもの）の性状について、次のA～Eのうち誤っているものはいくつある。\nA. 強い刺激臭のある液体である。\nB. エタノール、エーテルに溶けない。\nC. 酸化性物質との接触により、爆発することがある。\nD. 引火性を有していない。\nE. 110℃以上に加熱すると、爆発する。\n\n1. 1つ　2. 2つ　3. 3つ　4. 4つ　5. 5つ", choices:["1つ","2つ","3つ","4つ","5つ"], answer:2, explanation:"B：過酢酸はアルコール・エーテルによく溶ける（誤り）。D：引火性を有する（誤り）。BとDの2つが誤り。" },

  // ===== 硝酸エステル類 (13問) =====
  { category:"硝酸エステル類", id:"n01", question:"第5類の危険物のうち、常温（20℃）で引火の危険性があるものはどれか。\n1. エチルメチルケトンパーオキサイド（可塑剤で希釈し、55％にしたもの）\n2. ピクリン酸\n3. 硝酸エチル\n4. 過酸化ベンゾイル\n5. 過酢酸（酢酸で希釈し、40％にしたもの）", choices:["エチルメチルケトンパーオキサイド（可塑剤で希釈し、55％にしたもの）","ピクリン酸","硝酸エチル","過酸化ベンゾイル","過酢酸（酢酸で希釈し、40％にしたもの）"], answer:3, explanation:"硝酸エチルの引火点は10℃であり常温で引火の危険性を有する。MEKPO55%の引火点は約75℃、ピクリン酸150℃、過酸化ベンゾイル80〜125℃、過酢酸40%は41℃。" },
  { category:"硝酸エステル類", id:"n02", question:"硝酸エチルの性状について、次のうち誤っているものはどれか。\n1. 沸点は100℃より低い。\n2. 無色、無臭の液体である。\n3. 蒸気は空気より重く、低所に滞留しやすい。\n4. 水よりも重い。\n5. 引火点は常温（20℃）より低い。", choices:["沸点は100℃より低い。","無色、無臭の液体である。","蒸気は空気より重く、低所に滞留しやすい。","水よりも重い。","引火点は常温（20℃）より低い。"], answer:2, explanation:"硝酸エチルは無色の液体だが、芳香（甘い香り）を有する。無臭ではない。" },
  { category:"硝酸エステル類", id:"n03", question:"硝酸エチルの性状について、次のうち正しいものはどれか。\n1. 悪臭を有し、苦味がある。\n2. 沸点は水より低い。\n3. 水溶液は強い酸性を示す。\n4. 水より軽い。\n5. 蒸気は空気より軽い。", choices:["悪臭を有し、苦味がある。","沸点は水より低い。","水溶液は強い酸性を示す。","水より軽い。","蒸気は空気より軽い。"], answer:2, explanation:"硝酸エチルは芳香を有し、甘味がある。沸点は87〜89℃で水（100℃）より低い。水にはわずかしか溶けない。比重1.1で水より重い。蒸気比重3.1で空気より重い。" },
  { category:"硝酸エステル類", id:"n04", question:"硝酸エチルの性状について、次のうち正しいものはどれか。\n1. 悪臭を有し、苦味がある。\n2. 水によく溶ける。\n3. 沸点は100℃より低い。\n4. 水より軽い。\n5. 蒸気は空気より軽い。", choices:["悪臭を有し、苦味がある。","水によく溶ける。","沸点は100℃より低い。","水より軽い。","蒸気は空気より軽い。"], answer:3, explanation:"沸点は87〜89℃で100℃より低い。芳香と甘味あり（悪臭・苦味ではない）。水にはわずかしか溶けない。比重1.1（水より重い）。蒸気比重3.1（空気より重い）。" },
  { category:"硝酸エステル類", id:"n05", question:"ニトログリセリンの性状について、次のうち正しいものはどれか。\n1. 液体の場合は衝撃に対して鈍感で、取扱いしやすい。\n2. アセトン、メタノールおよび水のいずれにも、よく溶ける。\n3. 20℃では凍結した固体である。\n4. 水酸化ナトリウムのアルコール溶液で分解され、非爆発性物質となる。\n5. 水よりも軽い。", choices:["液体の場合は衝撃に対して鈍感で、取扱いしやすい。","アセトン、メタノールおよび水のいずれにも、よく溶ける。","20℃では凍結した固体である。","水酸化ナトリウムのアルコール溶液で分解され、非爆発性物質となる。","水よりも軽い。"], answer:4, explanation:"ニトログリセリンは油状液体で加熱・衝撃・摩擦で爆発する。有機溶媒には溶けるが水には難溶。8℃で凍結（20℃は液体）。比重1.6で水より重い。" },
  { category:"硝酸エステル類", id:"n06", question:"次のA～Cに掲げる危険物の性状のすべてに該当するものはどれか。\nA. 無色の油状物質である。\nB. ダイナマイトの原料である。\nC. 加熱や打撃により、爆発することがある。\n\n1. 過酸化ベンゾイル　2. トリニトロトルエン　3. ニトロセルロース　4. ピクリン酸　5. ニトログリセリン", choices:["過酸化ベンゾイル","トリニトロトルエン","ニトロセルロース","ピクリン酸","ニトログリセリン"], answer:5, explanation:"ニトログリセリンは純品は無色の油状液体で、ダイナマイトの原料であり、加熱や打撃により爆発する。" },
  { category:"硝酸エステル類", id:"n07", question:"「ニトロセルロースは自然発火を防止するため、通常（　）で湿らせて貯蔵する」\n（　）内に当てはまる物質はどれか。\n1. アルコール　2. 灯油　3. 希塩酸　4. 酢酸エチル　5. アセトン", choices:["アルコール","灯油","希塩酸","酢酸エチル","アセトン"], answer:1, explanation:"ニトロセルロースは通常、水やアルコールで湿らせて貯蔵する。" },
  { category:"硝酸エステル類", id:"n08", question:"ニトロセルロースの性状について、次のうち誤っているものはどれか。\n1. 窒素含有量の多い（硝化度の高い）ものは、危険性が低い。\n2. 乾燥すると強い衝撃、摩擦、加熱により発火または爆発のおそれがある。\n3. 燃焼すると、有害な窒素酸化物、一酸化炭素、二酸化炭素を発生する。\n4. エタノールで湿性したものは、危険性が低い。\n5. 日光の照射、加湿などにより自然発火のおそれがある。", choices:["窒素含有量の多い（硝化度の高い）ものは、危険性が低い。","乾燥すると強い衝撃、摩擦、加熱により発火または爆発のおそれがある。","燃焼すると、有害な窒素酸化物、一酸化炭素、二酸化炭素を発生する。","エタノールで湿性したものは、危険性が低い。","日光の照射、加湿などにより自然発火のおそれがある。"], answer:1, explanation:"窒素含有量の多いものほど爆発しやすく危険性が大きい。" },
  { category:"硝酸エステル類", id:"n09", question:"蒸し暑い日に屋内貯蔵所でニトロセルロースが出火した。容器のふたが完全に閉まっていなかったことが判明した。この出火原因に最も関係が深いものは次のうちどれか。\n1. 空気が入り、窒素の作用でニトロ化が進み、自然に分解して発熱した。\n2. 空気中の酸素によって、酸化され発熱した。\n3. 空気中の水分が混入したため、自然に分解して発熱した。\n4. 封入されていた不活性気体が空気中に放散したため、自然に分解して発熱した。\n5. 加湿用のアルコールが蒸発したため、自然に分解して発熱した。", choices:["空気が入り、窒素の作用でニトロ化が進み、自然に分解して発熱した。","空気中の酸素によって、酸化され発熱した。","空気中の水分が混入したため、自然に分解して発熱した。","封入されていた不活性気体が空気中に放散したため、自然に分解して発熱した。","加湿用のアルコールが蒸発したため、自然に分解して発熱した。"], answer:5, explanation:"ニトロセルロースはアルコールが蒸発して乾燥すると加熱や衝撃に敏感になる。また温度が高くなると分解が進み発熱して発火しやすくなる。蒸し暑い日にアルコールが蒸発したことが原因。" },
  { category:"硝酸エステル類", id:"n10", question:"ニトロセルロースの火災に使用する消火剤として、次のうち最も適切なものはどれか。\n1. 消火粉末　2. 二酸化炭素　3. 大量の水　4. 高膨張泡　5. ハロゲン化物", choices:["消火粉末","二酸化炭素","大量の水","高膨張泡","ハロゲン化物"], answer:3, explanation:"大量の水による冷却消火が適切。ただし棒状注水は厳禁。高膨張泡は窒息効果が主で第5類には効果が薄い。" },
  { category:"硝酸エステル類", id:"n11", question:"セルロイドの貯蔵にあたり、自然発火を防止するための措置として、次のうち最も適切なものはどれか。\n1. 密栓して暗所に置く。\n2. 熱風を送って乾燥させた屋内に置く。\n3. 通風がよく、湿気のない、温度の低い暗所に置く。\n4. 湿気を高くした暗所に置く。\n5. 通風、換気のない密閉された暗所に置く。", choices:["密栓して暗所に置く。","熱風を送って乾燥させた屋内に置く。","通風がよく、湿気のない、温度の低い暗所に置く。","湿気を高くした暗所に置く。","通風、換気のない密閉された暗所に置く。"], answer:3, explanation:"セルロイドは通風がよく、湿気がなく、温度が低く、日光を受けない場所に置く。" },
  { category:"硝酸エステル類", id:"n12", question:"セルロイドの性状について、次のうち誤っているものはどれか。\n1. 熱可塑性である。\n2. アセトン、酢酸エチルなどに溶ける。\n3. 100℃以下で軟化する。\n4. 一般に、粗製品ほど発火点が高くなる。\n5. 一般に、透明または半透明の固体である。", choices:["熱可塑性である。","アセトン、酢酸エチルなどに溶ける。","100℃以下で軟化する。","一般に、粗製品ほど発火点が高くなる。","一般に、透明または半透明の固体である。"], answer:4, explanation:"セルロイドは約90℃で軟化する。一般に、粗製品ほど発火点が低くなり危険性が増す。" },
  { category:"硝酸エステル類", id:"n13", question:"室内に置かれたセルロイドの危険性として、次のうち誤っているものはどれか。\n1. 燃焼速度が極めて大きく、他の可燃物への延焼危険が大きい。\n2. 湿度及び気温が高い日が続くと、自然発火を起こすことがある。\n3. 気温が低くても乾燥した日が続くと、自然発火しやすい。\n4. 粗製品は、精製品に比べ、自然発火する危険性が高い。\n5. 古い製品は分解しやすく、自然発火する危険性が高い。", choices:["燃焼速度が極めて大きく、他の可燃物への延焼危険が大きい。","湿度及び気温が高い日が続くと、自然発火を起こすことがある。","気温が低くても乾燥した日が続くと、自然発火しやすい。","粗製品は、精製品に比べ、自然発火する危険性が高い。","古い製品は分解しやすく、自然発火する危険性が高い。"], answer:3, explanation:"気温が低く、乾燥した日が続くと、自然発火する危険性が低くなる。湿度と気温が高い夏季に自然発火しやすい。" },

  // ===== ニトロ化合物 (8問) =====
  { category:"ニトロ化合物", id:"ni01", question:"ピクリン酸の性状について、次のうち正しいものはどれか。\n1. 芳香のある無色の液体で、甘味がある。\n2. 冷水によく溶け、ジエチルエーテル、ベンゼンには溶けない。\n3. 乾燥することにより、危険性が小さくなる。\n4. 金属塩となったものは爆発しない。\n5. ゆっくり加熱すると昇華するが、急熱すると爆発する。", choices:["芳香のある無色の液体で、甘味がある。","冷水によく溶け、ジエチルエーテル、ベンゼンには溶けない。","乾燥することにより、危険性が小さくなる。","金属塩となったものは爆発しない。","ゆっくり加熱すると昇華するが、急熱すると爆発する。"], answer:5, explanation:"ピクリン酸は無臭で黄色の結晶。苦みがある。冷水には溶けにくくジエチルエーテルやベンゼンには溶ける。乾燥すると危険性が高まる。金属塩は衝撃に敏感で爆発しやすい。" },
  { category:"ニトロ化合物", id:"ni02", question:"ピクリン酸の性状について、次のうち誤っているものはどれか。\n1. 苦味があり、有毒である。\n2. 水より重い透明の液体である。\n3. 単独のものより、硫黄、ヨウ素などとの混合物の方が、はるかに危険である。\n4. 乾燥状態のものは、危険性が高い。\n5. ジエチルエーテル、ベンゼンに溶ける。", choices:["苦味があり、有毒である。","水より重い透明の液体である。","単独のものより、硫黄、ヨウ素などとの混合物の方が、はるかに危険である。","乾燥状態のものは、危険性が高い。","ジエチルエーテル、ベンゼンに溶ける。"], answer:2, explanation:"ピクリン酸は黄色の結晶（液体ではない）。" },
  { category:"ニトロ化合物", id:"ni03", question:"ピクリン酸の性状について、次のA～Cのうち、正しいもののみをすべて掲げているものはどれか。\nA. 黄色の結晶で、アルコールによく溶ける。\nB. 金属と反応し、爆発しやすい金属塩を生成する。\nC. 水分を含むと、発火・爆発の危険性が増大する。\n\n1. A　2. C　3. A・B　4. B・C　5. A・B・C", choices:["A","C","A・B","B・C","A・B・C"], answer:3, explanation:"A：黄色の結晶でアルコールによく溶ける（○）。B：金属と反応し爆発しやすい金属塩を生成する（○）。C：ピクリン酸は水溶性で含水状態にすることで危険性が低下する（✖）。" },
  { category:"ニトロ化合物", id:"ni04", question:"ピクリン酸の貯蔵、取扱いについて、次のうち誤っているものはどれか。\n1. 安定化させるため水で湿性にする。\n2. 取り扱う機器や設備は防爆型のものを用いる。\n3. 加熱により爆発するので留意する。\n4. 金属製の容器に保存する。\n5. 衝撃、摩擦、振動を避ける。", choices:["安定化させるため水で湿性にする。","取り扱う機器や設備は防爆型のものを用いる。","加熱により爆発するので留意する。","金属製の容器に保存する。","衝撃、摩擦、振動を避ける。"], answer:4, explanation:"ピクリン酸はポリエチレンなどの容器に保存する。金属製の容器を使用すると反応して衝撃に敏感な金属塩を生成する。" },
  { category:"ニトロ化合物", id:"ni05", question:"ピクリン酸の貯蔵、取扱いについて、次のうち誤っているものはどれか。\n1. 衝撃、摩擦、振動を避ける。\n2. 取り扱う機器や設備は防爆型のものを用いる。\n3. 水を加えると爆発のおそれがある。\n4. 急激な加熱を避ける。\n5. 金属製の容器を避ける。", choices:["衝撃、摩擦、振動を避ける。","取り扱う機器や設備は防爆型のものを用いる。","水を加えると爆発のおそれがある。","急激な加熱を避ける。","金属製の容器を避ける。"], answer:3, explanation:"ピクリン酸は水溶性で、貯蔵する場合は含水状態にする。水を加えると爆発するというのは誤り。" },
  { category:"ニトロ化合物", id:"ni06", question:"トリニトロトルエンの性状について、次のうち誤っているものはどれか。\n1. 淡黄色または無色の結晶である。\n2. 金属と作用して爆発性の金属塩をつくる。\n3. 衝撃を加えると爆発する。\n4. 水より重い。\n5. アセトン、ベンゼンなどに溶ける。", choices:["淡黄色または無色の結晶である。","金属と作用して爆発性の金属塩をつくる。","衝撃を加えると爆発する。","水より重い。","アセトン、ベンゼンなどに溶ける。"], answer:2, explanation:"金属と作用して爆発性の金属塩をつくるのはピクリン酸。トリニトロトルエン（TNT）は金属と反応しない。" },
  { category:"ニトロ化合物", id:"ni07", question:"第5類の硝酸エステル類およびニトロ化合物について、次のA～Gのうち正しいものはいくつあるか。\nA. いずれも無機化合物である。\nB. いずれも酸化剤である。\nC. いずれも酸素を含有している。\nD. いずれも燃焼速度が極めて大きい。\nE. いずれも可燃物と酸素供給源とが共存している状態である。\nF. 硝酸エステル類は、水に溶けて強い酸性を示す。\nG. ニトロ化合物は金属と激しく反応する。\n\n1. 3つ　2. 4つ　3. 5つ　4. 6つ　5. 7つ", choices:["3つ","4つ","5つ","6つ","7つ"], answer:1, explanation:"C・D・Eが正しい。A：有機化合物。B：他の物質を酸化させる性質は持っていない。F：硝酸エステル類は水にほとんど溶けない。G：ピクリン酸は金属と反応するがTNTは反応しない。3つが正しい。" },
  { category:"ニトロ化合物", id:"ni08", question:"ピクリン酸とトリニトロトルエンの性状について、次のうち誤っているものはどれか。\n1. 常温（20℃）では固体である。\n2. ジエチルエーテルに溶ける。\n3. 分子中に3つのニトロ基を有している。\n4. ピクリン酸は金属と塩をつくるが、トリニトロトルエンはつくらない。\n5. 発火点は100℃未満である。", choices:["常温（20℃）では固体である。","ジエチルエーテルに溶ける。","分子中に3つのニトロ基を有している。","ピクリン酸は金属と塩をつくるが、トリニトロトルエンはつくらない。","発火点は100℃未満である。"], answer:5, explanation:"発火点はピクリン酸が300〜320℃、トリニトロトルエンが230℃。どちらも100℃未満ではない。" },

  // ===== ニトロソ化合物 (3問) =====
  { category:"ニトロソ化合物", id:"ns01", question:"ジニトロソペンタメチレンテトラミンの性状について、次のうち誤っているものはどれか。\n1. 淡黄色の粉末である。\n2. 水、ベンゼンにわずかに溶ける。\n3. 加熱により分解し、窒素を発生する。\n4. 酸性溶液中で安定する。\n5. 衝撃または摩擦によっても、爆発することがある。", choices:["淡黄色の粉末である。","水、ベンゼンにわずかに溶ける。","加熱により分解し、窒素を発生する。","酸性溶液中で安定する。","衝撃または摩擦によっても、爆発することがある。"], answer:4, explanation:"ジニトロソペンタメチレンテトラミンは酸との接触により発火する。酸性溶液中では不安定（安定するのは誤り）。" },
  { category:"ニトロソ化合物", id:"ns02", question:"ジニトロソペンタメチレンテトラミンの性状について、次のうち誤っているものはどれか。\n1. 淡黄色の粉末である。\n2. アセトン、メタノールによく溶ける。\n3. 急激に加熱すると、爆発的な分解を起こす。\n4. 熱分解により、窒素を発生する。\n5. 摩擦、衝撃により、爆発しやすい。", choices:["淡黄色の粉末である。","アセトン、メタノールによく溶ける。","急激に加熱すると、爆発的な分解を起こす。","熱分解により、窒素を発生する。","摩擦、衝撃により、爆発しやすい。"], answer:2, explanation:"ジニトロソペンタメチレンテトラミンはアセトン、メタノールにわずかに溶ける。「よく溶ける」は誤り。" },
  { category:"ニトロソ化合物", id:"ns03", question:"ジニトロソペンタメチレンテトラミンの性状について、次のうち誤っているものはどれか。\n1. 淡黄色の粉末である。\n2. 急激に加熱すると、爆発的に分解を起こす。\n3. 不活性気体中で加熱すると、硫化水素が発生する。\n4. アセトンやメタノールに、わずかに溶ける。\n5. 摩擦、衝撃により、爆発しやすい。", choices:["淡黄色の粉末である。","急激に加熱すると、爆発的に分解を起こす。","不活性気体中で加熱すると、硫化水素が発生する。","アセトンやメタノールに、わずかに溶ける。","摩擦、衝撃により、爆発しやすい。"], answer:3, explanation:"ジニトロソペンタメチレンテトラミンは炭素・水素・窒素・酸素の化合物であり、加熱分解により硫化水素H₂Sは発生しない。窒素やアンモニアなどが発生する。" },

  // ===== アゾ化合物 (4問) =====
  { category:"アゾ化合物", id:"a01", question:"アゾ化合物の性状について、次のうち誤っているものはどれか。\n1. アゾ基（ーN＝Nー）を有する化合物である。\n2. 芳香族アゾ化合物はすべて液体であり、アルキル基を持つアゾ化合物はすべて固体である。\n3. 融点以上に加熱すると急激に分解する。\n4. 貯蔵、取扱場所は火気厳禁とし、直射日光を避け、他の可燃物と分離する。\n5. 炎が継続して接触し、または他に可燃物が共存すれば燃焼は継続する。", choices:["アゾ基（ーN＝Nー）を有する化合物である。","芳香族アゾ化合物はすべて液体であり、アルキル基を持つアゾ化合物はすべて固体である。","融点以上に加熱すると急激に分解する。","貯蔵、取扱場所は火気厳禁とし、直射日光を避け、他の可燃物と分離する。","炎が継続して接触し、または他に可燃物が共存すれば燃焼は継続する。"], answer:2, explanation:"芳香族アゾ化合物であるアゾベンゼンは橙赤色の固体。芳香族アゾ化合物はすべて液体ではない。" },
  { category:"アゾ化合物", id:"a02", question:"次に掲げる危険物のうち、加熱すると有毒なシアン化水素（青酸ガス）を発生する可能性のあるものはどれか。\n1. 硫酸ヒドラジン\n2. ヒドロキシルアミン\n3. アジ化ナトリウム\n4. アゾビスイソブチロニトリル\n5. 過酸化ベンゾイル", choices:["硫酸ヒドラジン","ヒドロキシルアミン","アジ化ナトリウム","アゾビスイソブチロニトリル","過酸化ベンゾイル"], answer:4, explanation:"アゾビスイソブチロニトリルは融点（105℃）以上に加熱するとシアンガスと窒素に分解する。" },
  { category:"アゾ化合物", id:"a03", question:"アゾビスイソブチロニトリルの性状について、次のうち誤っているものはどれか。\n1. 衝撃、摩擦を加えると、爆発的に分解するおそれがある。\n2. 分解は自己加速的である。\n3. アセトンやヘプタン中では、安定である。\n4. 分解生成物には、窒素やシアン化水素などがある。\n5. 空気中で微粒子が拡散した場合は、粉じん爆発のおそれがある。", choices:["衝撃、摩擦を加えると、爆発的に分解するおそれがある。","分解は自己加速的である。","アセトンやヘプタン中では、安定である。","分解生成物には、窒素やシアン化水素などがある。","空気中で微粒子が拡散した場合は、粉じん爆発のおそれがある。"], answer:3, explanation:"アゾビスイソブチロニトリルはアセトンやヘプタンとは激しく反応する。火災や爆発の危険性がある。「安定」は誤り。" },
  { category:"アゾ化合物", id:"a04", question:"アゾビスイソブチロニトリルの性状について、次のうち誤っているものはどれか。\n1. アセトンやヘプタン中で取り扱うときは、条件により発火・爆発のおそれがある。\n2. 分解は自己加速的であり、多量のガスを発生するおそれがある。\n3. 空気中で微粒子が拡散した場合は、粉じん爆発のおそれがある。\n4. 加熱すると、容易に酸素を放出し爆発的に燃焼するおそれがある。\n5. 衝撃、摩擦を加えると、爆発的に分解するおそれがある。", choices:["アセトンやヘプタン中で取り扱うときは、条件により発火・爆発のおそれがある。","分解は自己加速的であり、多量のガスを発生するおそれがある。","空気中で微粒子が拡散した場合は、粉じん爆発のおそれがある。","加熱すると、容易に酸素を放出し爆発的に燃焼するおそれがある。","衝撃、摩擦を加えると、爆発的に分解するおそれがある。"], answer:4, explanation:"アゾビスイソブチロニトリルは加熱すると窒素とシアン化水素を含むガスを発生する。酸素は含有していないので「酸素を放出し」は誤り。" },

  // ===== ジアゾ化合物 (2問) =====
  { category:"ジアゾ化合物", id:"d01", question:"ジアゾジニトロフェノールの性状について、次のうち正しいものはどれか。\n1. 燃焼現象は爆ごうを起こしやすい。\n2. 水によく溶けるので、通常は水溶液として貯蔵する。\n3. 空気中の酸素を不燃性ガスで置換した状態では、燃焼現象は起こらない。\n4. アセトンにはほとんど溶けない。\n5. 黒色の不定形粉末である。", choices:["燃焼現象は爆ごうを起こしやすい。","水によく溶けるので、通常は水溶液として貯蔵する。","空気中の酸素を不燃性ガスで置換した状態では、燃焼現象は起こらない。","アセトンにはほとんど溶けない。","黒色の不定形粉末である。"], answer:1, explanation:"ジアゾジニトロフェノールは爆ごうを起こしやすく主に雷管用起爆薬として使われる。水にはほとんど溶けない。酸素含有物質なので不燃性ガス中でも燃焼する。アセトンには溶ける。黄色の不定形粉末（日光で褐色に変色）。" },
  { category:"ジアゾ化合物", id:"d02", question:"ジアゾジニトロフェノールの貯蔵、取扱いについて、次のうち誤っているものはどれか。\n1. 直射日光を避けて貯蔵する。\n2. 水中に貯蔵する。\n3. 粉末を散乱させないように取り扱う。\n4. 塊状のものは麻袋に詰めて打撃により粉砕する。\n5. 火気厳禁とする。", choices:["直射日光を避けて貯蔵する。","水中に貯蔵する。","粉末を散乱させないように取り扱う。","塊状のものは麻袋に詰めて打撃により粉砕する。","火気厳禁とする。"], answer:4, explanation:"ジアゾジニトロフェノールは粉末で、打撃を加えてはならない。衝撃・摩擦・加熱により容易に爆発する。" },

  // ===== ヒドラジンの誘導体 (3問) =====
  { category:"ヒドラジンの誘導体", id:"h01", question:"硫酸ヒドラジンの一般的性質で、次のうち誤っているものはどれか。\n1. 無色または白色の結晶である。\n2. 温水に溶ける。\n3. 直接触れると皮膚を刺激する。\n4. 還元性が強い。\n5. アルコールに溶ける。", choices:["無色または白色の結晶である。","温水に溶ける。","直接触れると皮膚を刺激する。","還元性が強い。","アルコールに溶ける。"], answer:5, explanation:"硫酸ヒドラジンはアルコールに溶けない。ただし温水には溶ける。" },
  { category:"ヒドラジンの誘導体", id:"h02", question:"硫酸ヒドラジンの性状について、次のうち誤っているものはどれか。\n1. 無色または白色の結晶である。\n2. エーテルによく溶ける。\n3. 強力な還元剤である。\n4. 水溶液は鉄製容器を腐食する。\n5. 加熱により刺激性のある有毒ガスを発生する。", choices:["無色または白色の結晶である。","エーテルによく溶ける。","強力な還元剤である。","水溶液は鉄製容器を腐食する。","加熱により刺激性のある有毒ガスを発生する。"], answer:2, explanation:"硫酸ヒドラジンはエーテルに溶けにくい。" },
  { category:"ヒドラジンの誘導体", id:"h03", question:"硫酸ヒドラジンの性状について、次のうち誤っているものはどれか。\n1. 無色または白色の結晶である。\n2. 還元性が強い。\n3. 水溶液はアルカリ性を示す。\n4. 融点以上で分解して、アンモニア、二酸化硫黄、硫化水素および硫黄を生成する。\n5. アルカリと接触するとヒドラジンを遊離する。", choices:["無色または白色の結晶である。","還元性が強い。","水溶液はアルカリ性を示す。","融点以上で分解して、アンモニア、二酸化硫黄、硫化水素および硫黄を生成する。","アルカリと接触するとヒドラジンを遊離する。"], answer:3, explanation:"硫酸ヒドラジンの水溶液は強い酸性を示す。" },

  // ===== ヒドロキシルアミン (3問) =====
  { category:"ヒドロキシルアミン", id:"hw01", question:"ヒドロキシルアミンの性状について、次のうち誤っているものはどれか。\n1. 高濃度の水溶液に、鉄イオンが存在すると、発火・爆発のおそれがある。\n2. 過酸化バリウムと接触すると、発火・爆発のおそれがある。\n3. 熱分解により、窒素、アンモニア、水などを生成する。\n4. エタノールによく溶ける。\n5. 水溶液は酸性である。", choices:["高濃度の水溶液に、鉄イオンが存在すると、発火・爆発のおそれがある。","過酸化バリウムと接触すると、発火・爆発のおそれがある。","熱分解により、窒素、アンモニア、水などを生成する。","エタノールによく溶ける。","水溶液は酸性である。"], answer:5, explanation:"ヒドロキシルアミンの水溶液は弱アルカリ性を示す。" },
  { category:"ヒドロキシルアミン", id:"hw02", question:"ヒドロキシルアミンの貯蔵および取扱方法について、次のA～Eのうち適切でないものの組合せはどれか。\nA. 裸火、火花、高温面と接触させない。\nB. 二酸化炭素と共存させない。\nC. 安定させるために、水酸化ナトリウムを混入する。\nD. 乾燥した冷暗所に密封して保存する。\nE. 設備や容器は金属（鉄、銅）製とする。\n\n1. AとC　2. AとD　3. BとD　4. BとE　5. CとE", choices:["AとC","AとD","BとD","BとE","CとE"], answer:5, explanation:"C：ヒドロキシルアミンは水酸化ナトリウムと激しく反応するため混入してはならない。E：水溶液に鉄イオンが混入すると自己発熱分解が促進されるためガラスやプラスチックを使う。CとEが不適切。" },
  { category:"ヒドロキシルアミン", id:"hw03", question:"ヒドロキシルアミンの貯蔵および取扱方法について、次のA～Eのうち、適切でないものを組み合わせたものはどれか。\nA. 裸火、火花、高温面と接触させない。\nB. 安定させるために、水酸化ナトリウムを混入する。\nC. 鉄イオンの混入を防止する。\nD. 常温（20℃）で分解して内圧が上昇するので、貯蔵容器は通気性があるふたを用いる。\nE. 二酸化炭素と共存させない。\n\n1. AとC　2. AとD　3. BとD　4. BとE　5. CとE", choices:["AとC","AとD","BとD","BとE","CとE"], answer:3, explanation:"B：水酸化ナトリウムと激しく反応するため混入してはならない（不適切）。D：貯蔵容器は密封して冷暗所に保管する（通気性ふたは不適切）。BとDが不適切。" },

  // ===== ヒドロキシルアミン塩類 (5問) =====
  { category:"ヒドロキシルアミン塩類", id:"hs01", question:"硫酸ヒドロキシルアミンの性状について、次のA～Eのうち、正しいものを組み合わせたものはどれか。\nA. アルカリとの接触で激しく分解するが、酸化剤に対しては安定である。\nB. 湿気を含んだものは、金属（鉄、銅、アルミニウム）製の容器が適している。\nC. 加熱や燃焼により有毒ガスの発生のおそれがある。\nD. エーテルやアルコールによく溶ける。\nE. 粉じんが舞い上がり空気と混合すると、粉じん爆発のおそれがある。\n\n1. AとC　2. AとD　3. BとD　4. BとE　5. CとE", choices:["AとC","AとD","BとD","BとE","CとE"], answer:5, explanation:"C・Eが正しい。A：強い還元剤のため酸化剤と接触すると激しく反応する。B：水溶液は金属を腐食するため金属容器は不適。D：エーテルやアルコールには不溶。" },
  { category:"ヒドロキシルアミン塩類", id:"hs02", question:"硫酸ヒドロキシルアミンの性状について、次のうち誤っているものはどれか。\n1. 無色または白色の結晶である。\n2. エーテルによく溶ける。\n3. 強力な還元剤である。\n4. 水溶液は鉄製容器を腐食する。\n5. 加熱により刺激性のある有毒ガスを発生する。", choices:["無色または白色の結晶である。","エーテルによく溶ける。","強力な還元剤である。","水溶液は鉄製容器を腐食する。","加熱により刺激性のある有毒ガスを発生する。"], answer:2, explanation:"硫酸ヒドロキシルアミンは水によく溶けるが、ジエチルエーテルやアルコールには溶けない。" },
  { category:"ヒドロキシルアミン塩類", id:"hs03", question:"硫酸ヒドロキシルアミンの性状について、次のうち誤っているものはどれか。\n1. 無色または白色の結晶である。\n2. ガラス製容器を溶かす。\n3. 水によく溶ける。\n4. 強力な還元剤である。\n5. 加熱により、刺激性のある有毒ガスを発生する。", choices:["無色または白色の結晶である。","ガラス製容器を溶かす。","水によく溶ける。","強力な還元剤である。","加熱により、刺激性のある有毒ガスを発生する。"], answer:2, explanation:"硫酸ヒドロキシルアミンの水溶液は金属を腐食するが、ガラス製容器は腐食しない。ポリエチレンやガラスなどの耐腐食性容器が適している。" },
  { category:"ヒドロキシルアミン塩類", id:"hs04", question:"硫酸ヒドロキシルアミンの貯蔵、取扱いについて、次のうち誤っているものはどれか。\n1. 湿潤な場所に貯蔵する。\n2. 高温になる場所に貯蔵しない。\n3. 粉じんの吸入を避ける。\n4. クラフト紙袋に入った状態で流通することがある。\n5. 水溶液は、鉄製容器に貯蔵してはならない。", choices:["湿潤な場所に貯蔵する。","高温になる場所に貯蔵しない。","粉じんの吸入を避ける。","クラフト紙袋に入った状態で流通することがある。","水溶液は、鉄製容器に貯蔵してはならない。"], answer:1, explanation:"硫酸ヒドロキシルアミンは水によく溶ける結晶であるため、乾燥した場所に貯蔵する。" },
  { category:"ヒドロキシルアミン塩類", id:"hs05", question:"硫酸ヒドロキシルアミンの貯蔵、取扱いについて、次のうち誤っているものはどれか。\n1. 粉じんの吸入を避ける。\n2. 乾燥した場所に貯蔵する。\n3. クラフト紙袋に入った状態で流通することがある。\n4. 高温になる場所に貯蔵しない。\n5. 水溶液はガラス製容器に貯蔵してはならない。", choices:["粉じんの吸入を避ける。","乾燥した場所に貯蔵する。","クラフト紙袋に入った状態で流通することがある。","高温になる場所に貯蔵しない。","水溶液はガラス製容器に貯蔵してはならない。"], answer:5, explanation:"硫酸ヒドロキシルアミンの水溶液はポリエチレンやガラスなどの耐腐食性容器が適している。ガラス製容器は腐食されないので貯蔵可能。「貯蔵してはならない」は誤り。" },

  // ===== その他政令で定めるもの (11問) =====

function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ===== QUIZ =====
function QuizScreen({ questions, onFinish }) {
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [score, setScore] = useState(0);
  const [history, setHistory] = useState([]);

  const q = questions[current];
  const progress = (current / questions.length) * 100;
  const isCorrect = answered && selected + 1 === q.answer;

  const handleSelect = (idx) => {
    if (answered) return;
    setSelected(idx);
    setAnswered(true);
    const correct = idx + 1 === q.answer;
    if (correct) { setScore(s => s + 1); playCorrect(); } else { playWrong(); }
    setHistory(h => [...h, { question: q, selected: idx, correct }]);
  };

  const handleNext = () => {
    if (current + 1 >= questions.length) {
      onFinish(history, score + (selected + 1 === q.answer ? 1 : 0));
    } else {
      setCurrent(c => c + 1);
      setSelected(null);
      setAnswered(false);
    }
  };

  const catColor = CATEGORY_COLORS[q.category] || '#555';

  return e('div', { style: { minHeight:'100vh', background:'#0f0f1a', fontFamily:'-apple-system,Hiragino Sans,sans-serif', color:'#eee' } },
    // ヘッダー
    e('div', { style: { background:'rgba(255,255,255,0.03)', borderBottom:'1px solid rgba(255,255,255,0.07)', padding:'12px 16px' } },
      e('div', { style: { display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 } },
        e('span', { style: { fontSize:13, color:'#aaa' } }, '問題 ', e('strong', { style: { color:'#fff', fontSize:16 } }, current + 1), ' / ', questions.length),
        e('span', { style: { fontSize:14, color:'#2ecc71', fontWeight:700 } }, '正解 ' + score + '問')
      ),
      e('div', { style: { height:5, background:'rgba(255,255,255,0.08)', borderRadius:3 } },
        e('div', { style: { height:5, borderRadius:3, background:'#e74c3c', width: progress + '%', transition:'width 0.4s' } })
      )
    ),
    // 本文
    e('div', { style: { padding:'16px 16px 100px' } },
      e('div', { style: { marginBottom:12 } },
        e('span', { style: { display:'inline-block', background:catColor, color:'#fff', fontSize:11, padding:'4px 12px', borderRadius:20, fontWeight:700 } }, q.category)
      ),
      e('div', { style: { background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:16, padding:'18px 16px', marginBottom:16 } },
        e('p', { style: { fontSize:14, lineHeight:2.0, whiteSpace:'pre-wrap', margin:0 } }, q.question)
      ),
      e('div', { style: { display:'flex', flexDirection:'column', gap:10, marginBottom:16 } },
        q.choices.map((c, i) => {
          const isCor = i + 1 === q.answer;
          const isSel = i === selected;
          let bg = 'rgba(255,255,255,0.04)';
          let border = '1px solid rgba(255,255,255,0.1)';
          let tc = '#ccc';
          if (answered) {
            if (isCor) { bg = 'rgba(46,204,113,0.15)'; border = '2px solid #2ecc71'; tc = '#2ecc71'; }
            else if (isSel) { bg = 'rgba(231,76,60,0.15)'; border = '2px solid #e74c3c'; tc = '#e74c3c'; }
          }
          return e('button', {
            key: i,
            onClick: () => handleSelect(i),
            disabled: answered,
            style: { background:bg, border, color:tc, padding:'14px 16px', borderRadius:12, textAlign:'left', cursor:answered?'default':'pointer', fontSize:14, lineHeight:1.6, fontFamily:'-apple-system,Hiragino Sans,sans-serif', display:'flex', alignItems:'flex-start', gap:12 }
          },
            e('span', { style: { width:26, height:26, minWidth:26, borderRadius:'50%', background:answered&&isCor?'#2ecc71':answered&&isSel?'#e74c3c':'rgba(255,255,255,0.12)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:900, color:'#fff', marginTop:1 } },
              answered && isCor ? '✓' : answered && isSel && !isCor ? '✗' : String(i + 1)
            ),
            e('span', { style: { flex:1 } }, c)
          );
        })
      ),
      answered && e('div', { style: { background:isCorrect?'rgba(46,204,113,0.08)':'rgba(231,76,60,0.08)', border:'1px solid ' + (isCorrect?'rgba(46,204,113,0.3)':'rgba(231,76,60,0.3)'), borderRadius:14, padding:16, marginBottom:16 } },
        e('div', { style: { fontSize:16, fontWeight:900, marginBottom:8, color:isCorrect?'#2ecc71':'#e74c3c' } }, isCorrect ? '✅ 正解！' : '❌ 不正解'),
        e('p', { style: { fontSize:13, lineHeight:1.8, color:'#bbb', margin:0 } }, '💡 ', q.explanation)
      )
    ),
    // 次へボタン固定
    answered && e('div', { style: { position:'fixed', bottom:0, left:0, right:0, padding:'12px 16px', background:'rgba(15,15,26,0.95)', borderTop:'1px solid rgba(255,255,255,0.08)' } },
      e('button', {
        onClick: handleNext,
        style: { width:'100%', padding:16, borderRadius:14, border:'none', background:'linear-gradient(135deg,#e74c3c,#c0392b)', color:'#fff', fontSize:16, fontWeight:900, cursor:'pointer', letterSpacing:1 }
      }, current + 1 >= questions.length ? '結果を見る 🏁' : '次の問題 →')
    )
  );

// ===== MAIN APP =====
function App() {
  const [mode, setMode] = useState('menu');
  const [questions, setQuestions] = useState([]);
  const [history, setHistory] = useState([]);
  const [score, setScore] = useState(0);
  const [reviewStartIdx, setReviewStartIdx] = useState(0);

  const handleStart = (cat, num) => {
    const pool = cat === 'すべて' ? ALL_QUESTIONS : ALL_QUESTIONS.filter(q => q.category === cat);
    const shuffled = shuffle(pool).slice(0, num);
    setQuestions(shuffled);
    setHistory([]);
    setScore(0);
    setMode('quiz');
  };

  const handleFinish = (hist, finalScore) => {
    setHistory(hist);
    setScore(finalScore);
    setMode('result');
  };

  const handleReview = (startIdx) => {
    setReviewStartIdx(startIdx);
    setMode('review');
  };

  const tabBar = e(TabBar, {
    onReference: () => setMode('reference'),
    onQuiz: () => setMode('menu'),
    onSettings: () => setMode('settings'),
  });

  // reference・settings画面はタブバー付きで表示
  if (mode === 'reference') return e('div', null, e(ReferenceScreen, { onBack: () => setMode('menu') }), tabBar);
  if (mode === 'settings') return e('div', null, e(SettingsScreen, { onBack: () => setMode('menu') }), tabBar);
  // menu画面もタブバー付き
  if (mode === 'menu') return e('div', null, e(MenuScreen, { onStart: handleStart }), tabBar);
  // quiz中・結果・解説はタブバーなし（画面占有）
  if (mode === 'quiz') return e(QuizScreen, { questions, onFinish: handleFinish });
  if (mode === 'result') return e(ResultScreen, { history, score, totalQ: questions.length, onRetry: () => setMode('menu'), onReview: handleReview });
  if (mode === 'review') return e(ReviewScreen, { history, startIdx: reviewStartIdx, onBack: () => setMode('result') });
  return null;
}


// ===== 効果音生成 (Web Audio API) =====
function playCorrect() {
  if (!window._soundOn) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // 正解：明るい上昇音
    const times = [[0, 523.25, 0.15], [0.1, 659.25, 0.15], [0.2, 783.99, 0.25]];
    times.forEach(([t, freq, dur]) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq; o.type = 'sine';
      g.gain.setValueAtTime(0.3, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + dur);
      o.start(ctx.currentTime + t);
      o.stop(ctx.currentTime + t + dur + 0.05);
    });
  } catch(e){}
}

function playWrong() {
  if (!window._soundOn) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // 不正解：低い下降音
    const times = [[0, 300, 0.15], [0.15, 220, 0.3]];
    times.forEach(([t, freq, dur]) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq; o.type = 'sawtooth';
      g.gain.setValueAtTime(0.2, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + dur);
      o.start(ctx.currentTime + t);
      o.stop(ctx.currentTime + t + dur + 0.05);
    });
  } catch(e){}
}
